name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: check (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Type-check (mypy --strict)
        run: mypy
      - name: Tests + coverage
        run: |
          coverage run -m pytest
          coverage report --fail-under=85

  gate:
    name: self-gate (report + regress vs baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Report on sample logs and regress against the committed baseline
        run: |
          logaudit report logs/sample_app.jsonl -o out
          logaudit regress out/report.json --baseline baselines/baseline.json
